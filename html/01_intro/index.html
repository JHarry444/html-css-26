<!-- DTD - Doc Type Declaration - version -->
<!DOCTYPE html>
<!-- HTML -  Containes the whole of the HTML -->
<html lang="en">
<!-- head - metadata - information about the page -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title - name in the tab -->
    <title>Intro</title>
    <link rel="stylesheet" href="index.css">
    <script src="./index.js"></script>
</head>
<!-- body - actual page content -->

<body>

    <!-- main content on the page -->
    <main>
        <header>
            <!-- nav - links -->
            <nav>
                <a href="https://www.bbc.co.uk/newsround/articles/c0lj34w3j0wo">Turtles</a>
            </nav>
        </header>
        <!-- article - contains the whole article -->
        <article>
            <section>
                <!-- heading - bigger number = bigger text -->
                <h2>Some heading</h2>
                <!-- paragraph - adds line breaks -->
                <p> Text related to the heading </p>
            </section>
            <section>
                <h2>Another heading</h2>
                <p>More text</p>
            </section>
        </article>
        <aside style="float: right;">
            <h2>I'm on the right</h2>
            <p>LOOK AT MEEEEEEEEEEE</p>
        </aside>

    </main>
    <footer>
        <!-- div - divider -->
        <div style="color: blue;">
            <ol>
                <li>milk</li>
                <li>eggs</li>
            </ol>


            <ul>
                <li>go to dentist</li>
                <li>take out recycling</li>
            </ul>
        </div>
    </footer>


</body>

</html>
