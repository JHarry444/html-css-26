<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists and Tables</title>

    <style>
        ul {
            list-style-type: circle;
            list-style-position: inside;
            list-style-image: url(me.jpg);
        }

        table, td, th {
            border: 1px solid black;
            border-collapse: collapse;
            caption-side: bottom;
            /* empty-cells: hide;  only works if you haven't set border-collapse*/
        }


        tbody > tr:nth-child(odd) {
            background-color: lightgrey;
        }

        tbody  td:hover {
            background-color: pink;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <section>
        <h2>Lists</h2>
        <ul>
            <li>Jordan</li>
            <li>Cameron</li>
            <li>Andy</li>
        </ul>
    </section>
    <section>
        <h2>Tables</h2>
        <table id="trainerTable">
            <caption>Trainers</caption>
            <thead>
                <tr>
                    <th>
                        Name
                    </th>
                    <th>
                        Age
                    </th>
                    <th>
                        Specialism
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        Jordan
                    </td>
                    <td>
                        31
                    </td>
                    <td>
                        Java
                    </td>
                </tr>
                <tr>
                    <td>
                        Cameron
                    </td>
                    <td>
                        32
                    </td>
                    <td>
                        Web
                    </td>
                </tr>
                <tr>
                    <td>
                        Shafeeq
                    </td>
                    <td>
                        40
                    </td>
                    <td>

                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <script>
        document.getElementById("trainerTable").addEventListener("mouseover", function() {
            console.log("YO!");
            
        })
    </script>
</body>

</html>
