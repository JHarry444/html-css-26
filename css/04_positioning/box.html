<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>

    <style>
        /* Selects EVERY element */
        /* makes their height+width reflect their aactual height + width not the base */
        * {
          box-sizing: border-box;  
        }
    </style>
</head>

<body>
    <button style="padding: 133px;">Button 1</button>
    <button>Button 2</button>
    <p style="padding: 5px 10px 15px 20px; border: 5px dotted pink; margin: 50px;">Lorem ipsum dolor sit amet,
        consectetur adipiscing elit. Duis ante metus, tristique eu cursus
        eget,
        lacinia at augue. Curabitur sagittis est porta enim tincidunt ultrices. Integer hendrerit ut massa
        eget
        viverra.</p>
    <a href=" #">Link 1</a>
    <a href="#" style="margin: 10px;">Link 2</a>
    <a href="#">Link 3</a>
    <a href="#">Link 4</a>

</body>

</html>
